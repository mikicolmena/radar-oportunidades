name: Motor Radar SEF

# ¿Cuándo se ejecuta esto?
on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 8:00 AM (Hora UTC)
  workflow_dispatch: # Esto te pone un botón en GitHub para ejecutarlo a mano cuando quieras

jobs:
  rastrear:
    runs-on: ubuntu-latest # GitHub nos presta un servidor con Linux gratis
    permissions:
      contents: write # Le damos permiso para guardar el archivo modificado en la web

    steps:
    - name: Descargar los archivos de la web
      uses: actions/checkout@v4

    - name: Preparar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar el motor (Librerías)
      run: pip install requests beautifulsoup4

    - name: Ejecutar el cazador del SEF
      run: python scraper_sef.py

    - name: Guardar los nuevos empleos en la web (Commit & Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Radar Bot"
        git add empleos.json
        # Si no hay ofertas nuevas, no hace nada. Si hay cambios, los sube.
        git commit -m "🤖 Ofertas del SEF actualizadas automáticamente" || exit 0
        git push